name: velora_app
description: Velora - Clon de Instagram desarrollado en Flutter
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  http: ^1.2.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  video_player: ^2.9.1
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  intl: ^0.19.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/videos/