spring.application.name=velora-backend

server.port=${PORT:8080}
server.servlet.context-path=

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:instagramdb}?sslmode=${DB_SSLMODE:disable}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:velora_local_secret_key_change_me_2026_segura}
jwt.expiration=${JWT_EXPIRATION:86400000}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

logging.level.root=${LOGGING_LEVEL:INFO}